<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Факультет — 20 років</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --surface2: #1d1d20;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0ede8;
    --text2: #9b9893;
    --text3: #5a5855;
    --accent: #c9a96e;
    --accent2: #e8d5b0;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', system-ui, sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-weight: 300;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* HERO */
  .hero {
    padding: 80px 40px 60px;
    max-width: 1200px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }
  .hero-left {}
  .hero-eyebrow {
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(42px, 6vw, 80px);
    font-weight: 400;
    line-height: 1.05;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .hero-title em {
    font-style: italic;
    color: var(--accent);
  }
  .hero-subtitle {
    margin-top: 20px;
    font-size: 15px;
    color: var(--text2);
    max-width: 420px;
    line-height: 1.7;
  }
  .hero-right {
    text-align: right;
    flex-shrink: 0;
  }
  .hero-stat {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .hero-stat-label {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  /* YEAR NAV */
  .year-nav-wrap {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(14,14,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .year-nav {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .year-nav::-webkit-scrollbar { display: none; }
  .year-btn {
    padding: 14px 18px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 400;
    color: var(--text3);
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.2s, border-color 0.2s;
    letter-spacing: 0.02em;
  }
  .year-btn:hover { color: var(--text2); }
  .year-btn.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 500;
  }

  /* TIMELINE */
  .timeline {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 40px 80px;
  }

  .year-block {
    padding: 52px 0 0;
    transition: opacity 0.3s;
  }
  .year-block.hidden { display: none; }

  .year-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 28px;
  }
  .year-number {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 400;
    color: var(--text);
    line-height: 1;
    letter-spacing: -0.02em;
  }
  .year-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
    position: relative;
    top: -6px;
  }
  .year-event-tag {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    padding: 4px 10px;
    border: 1px solid rgba(201,169,110,0.25);
    border-radius: 2px;
    white-space: nowrap;
  }

  /* PHOTO GRID — masonry-like with CSS grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 12px;
  }

  .photo-item {
    cursor: pointer;
    overflow: hidden;
    border-radius: 4px;
    position: relative;
  }
  .photo-item:nth-child(6n+1) { grid-column: span 5; }
  .photo-item:nth-child(6n+2) { grid-column: span 4; }
  .photo-item:nth-child(6n+3) { grid-column: span 3; }
  .photo-item:nth-child(6n+4) { grid-column: span 3; }
  .photo-item:nth-child(6n+5) { grid-column: span 5; }
  .photo-item:nth-child(6n+6) { grid-column: span 4; }

  .photo-inner {
    width: 100%;
    aspect-ratio: 4/3;
    overflow: hidden;
    position: relative;
    background: var(--surface2);
  }
  .photo-item:nth-child(3n+1) .photo-inner { aspect-ratio: 3/2; }
  .photo-item:nth-child(3n+2) .photo-inner { aspect-ratio: 4/3; }
  .photo-item:nth-child(3n+3) .photo-inner { aspect-ratio: 1/1; }

  .photo-inner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.3s;
    filter: grayscale(20%) brightness(0.9);
  }
  .photo-item:hover .photo-inner img {
    transform: scale(1.05);
    filter: grayscale(0%) brightness(1);
  }

  .photo-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    align-items: flex-end;
    padding: 14px;
  }
  .photo-item:hover .photo-overlay { opacity: 1; }
  .photo-overlay-title {
    font-size: 12px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.02em;
  }

  .photo-caption {
    padding: 8px 2px 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .caption-title {
    font-size: 12px;
    font-weight: 400;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .caption-year {
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
  }

  /* LIGHTBOX */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: rgba(0,0,0,0.92);
    align-items: center;
    justify-content: center;
    padding: 24px;
    animation: lbFadeIn 0.2s ease;
  }
  .lightbox.open { display: flex; }

  @keyframes lbFadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lb-inner {
    max-width: 900px;
    width: 100%;
    animation: lbSlide 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  @keyframes lbSlide {
    from { transform: translateY(16px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .lb-img-wrap {
    width: 100%;
    max-height: 65vh;
    overflow: hidden;
    border-radius: 4px;
    background: var(--surface2);
    position: relative;
  }
  .lb-img-wrap img {
    width: 100%;
    height: 100%;
    max-height: 65vh;
    object-fit: cover;
    display: block;
  }

  .lb-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 0;
    gap: 16px;
  }
  .lb-info {}
  .lb-title {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 4px;
  }
  .lb-sub {
    font-size: 13px;
    color: var(--text3);
  }
  .lb-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .lb-btn {
    width: 40px; height: 40px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    border-radius: 3px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    font-family: var(--font-body);
  }
  .lb-btn:hover { background: var(--surface2); color: var(--text); }
  .lb-btn:disabled { opacity: 0.25; cursor: default; }
  .lb-counter {
    font-size: 12px;
    color: var(--text3);
    min-width: 40px;
    text-align: center;
  }

  /* FOOTER */
  .footer {
    border-top: 1px solid var(--border);
    padding: 32px 40px;
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text { font-size: 12px; color: var(--text3); letter-spacing: 0.05em; }

  /* FADE-IN ANIMATION */
  .year-block {
    animation: fadeUp 0.4s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-left">
    <div class="hero-eyebrow">Фотогалерея</div>
    <h1 class="hero-title">Двадцять<br>років <em>разом</em></h1>
    <p class="hero-subtitle">Архів моментів, подій і людей, які створили факультет таким, яким він є сьогодні.</p>
  </div>
  <div class="hero-right">
    <div class="hero-stat" id="total-count">—</div>
    <div class="hero-stat-label">фотографій</div>
  </div>
</div>

<div class="year-nav-wrap">
  <div class="year-nav" id="year-nav"></div>
</div>

<div class="timeline" id="timeline"></div>

<div class="footer">
  <span class="footer-text">Факультет · 2004–2024</span>
  <span class="footer-text" id="footer-count"></span>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-inner">
    <div class="lb-img-wrap">
      <img id="lb-img" src="" alt="">
    </div>
    <div class="lb-bar">
      <div class="lb-info">
        <div class="lb-title" id="lb-title"></div>
        <div class="lb-sub" id="lb-sub"></div>
      </div>
      <div class="lb-controls">
        <button class="lb-btn" id="lb-prev">←</button>
        <span class="lb-counter" id="lb-counter"></span>
        <button class="lb-btn" id="lb-next">→</button>
        <button class="lb-btn" id="lb-close">✕</button>
      </div>
    </div>
  </div>
</div>

<script>
const DATA = [
  { year: 2004, event: 'Заснування', photos: [
    { title: 'Перший день', desc: 'Відкриття факультету, вересень 2004', seed: 10 },
    { title: 'Перші студенти', desc: 'Перша група, осінь 2004', seed: 20 },
    { title: 'Аудиторія 101', desc: 'Перша лекція', seed: 30 },
    { title: 'Команда засновників', desc: 'Декан та викладачі, 2004', seed: 40 },
  ]},
  { year: 2006, event: 'Перший випуск', photos: [
    { title: 'Випускний вечір', desc: 'Перші 28 випускників, червень 2006', seed: 50 },
    { title: 'Вручення дипломів', desc: 'Актова зала', seed: 60 },
    { title: 'Студентське свято', desc: 'Після церемонії', seed: 70 },
  ]},
  { year: 2008, event: 'Розширення', photos: [
    { title: 'Новий корпус', desc: 'Відкриття другого корпусу, 2008', seed: 80 },
    { title: 'Наукова конференція', desc: 'Перша міжнародна, жовтень 2008', seed: 90 },
    { title: 'Лабораторія', desc: 'Відкриття дослідницького центру', seed: 100 },
    { title: 'Студентська рада', desc: 'Перші вибори, 2008', seed: 110 },
    { title: 'Спортивний день', desc: 'Щорічні змагання', seed: 120 },
  ]},
  { year: 2011, event: 'Акредитація', photos: [
    { title: 'Міжнародна акредитація', desc: 'Отримання сертифікату', seed: 130 },
    { title: 'Партнери з Польщі', desc: 'Підписання угоди, Краків', seed: 140 },
    { title: 'Відкрита лекція', desc: 'Запрошений професор з Берліна', seed: 150 },
  ]},
  { year: 2014, event: '10-річчя', photos: [
    { title: 'Ювілей — 10 років', desc: 'Велике святкування, жовтень 2014', seed: 160 },
    { title: 'Виставка досягнень', desc: 'Холл першого корпусу', seed: 170 },
    { title: 'Олімпіада', desc: '1 місце в регіоні', seed: 180 },
    { title: 'Капсула часу', desc: 'Закладено до 20-річчя', seed: 190 },
    { title: 'Концерт', desc: 'Студентський оркестр', seed: 200 },
    { title: 'Почесні гості', desc: 'Ректор університету та мер', seed: 210 },
  ]},
  { year: 2017, event: 'Нові програми', photos: [
    { title: 'Запуск магістратури', desc: 'Нова програма, 2017', seed: 220 },
    { title: 'Стажування в ЄС', desc: 'Перший обмін, Варшава', seed: 230 },
    { title: 'Хакатон', desc: '72 год., 18 команд', seed: 240 },
    { title: 'Гості з Японії', desc: 'Делегація університету Осака', seed: 250 },
  ]},
  { year: 2020, event: 'Адаптація', photos: [
    { title: 'Онлайн-навчання', desc: 'Перехід на дистанційний формат', seed: 260 },
    { title: 'Гібридні заняття', desc: 'Нова аудиторія з трансляцією', seed: 270 },
    { title: 'Підтримка студентів', desc: 'Волонтерський центр, 2020', seed: 280 },
  ]},
  { year: 2022, event: 'Відновлення', photos: [
    { title: 'Повернення до кампусу', desc: 'Відновлення офлайн-занять', seed: 290 },
    { title: 'Випуск 2022', desc: 'Перша очна церемонія після перерви', seed: 300 },
    { title: 'Нова лабораторія ШІ', desc: 'Відкриття центру AI, 2022', seed: 310 },
    { title: 'Зустріч alumni', desc: 'Понад 200 випускників', seed: 320 },
  ]},
  { year: 2024, event: '20-річчя', photos: [
    { title: 'Ювілейне відкриття', desc: 'Святкування 20 років, жовтень 2024', seed: 330 },
    { title: 'Галерея пам\'яті', desc: 'Виставка в холі, осінь 2024', seed: 340 },
    { title: 'Спільне фото', desc: 'Всі покоління разом', seed: 350 },
    { title: 'Нова капсула часу', desc: 'Закладено до 30-річчя', seed: 360 },
    { title: 'Почесні випускники', desc: 'Нагородження, 2024', seed: 370 },
    { title: 'Концерт та банкет', desc: 'Фінальна урочиста частина', seed: 380 },
  ]},
];

function imgUrl(seed, w, h) {
  return `https://picsum.photos/seed/${seed}/${w}/${h}`;
}

let allPhotos = [];
let currentPhotos = [];
let activeYear = 'all';
let lbIndex = 0;

DATA.forEach(yr => {
  yr.photos.forEach(ph => {
    allPhotos.push({ ...ph, year: yr.year, event: yr.event });
  });
});

document.getElementById('total-count').textContent = allPhotos.length;
document.getElementById('footer-count').textContent = allPhotos.length + ' фотографій · ' + DATA.length + ' епох';

function buildNav() {
  const nav = document.getElementById('year-nav');
  nav.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'year-btn' + (activeYear === 'all' ? ' active' : '');
  allBtn.textContent = 'Всі роки';
  allBtn.onclick = () => { activeYear = 'all'; render(); scrollNav(allBtn); };
  nav.appendChild(allBtn);

  DATA.forEach(yr => {
    const btn = document.createElement('button');
    btn.className = 'year-btn' + (activeYear === yr.year ? ' active' : '');
    btn.textContent = yr.year;
    btn.dataset.year = yr.year;
    btn.onclick = () => { activeYear = yr.year; render(); scrollNav(btn); };
    nav.appendChild(btn);
  });
}

function scrollNav(btn) {
  btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
}

function render() {
  buildNav();
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';
  currentPhotos = [];

  const years = activeYear === 'all' ? DATA : DATA.filter(d => d.year === activeYear);

  years.forEach((yr, yi) => {
    const block = document.createElement('div');
    block.className = 'year-block';
    block.dataset.year = yr.year;
    block.style.animationDelay = (yi * 0.05) + 's';

    block.innerHTML = `
      <div class="year-header">
        <div class="year-number">${yr.year}</div>
        <div class="year-divider"></div>
        <div class="year-event-tag">${yr.event}</div>
      </div>
    `;

    const grid = document.createElement('div');
    grid.className = 'photo-grid';

    yr.photos.forEach((ph, pi) => {
      const globalIdx = currentPhotos.length;
      currentPhotos.push({ ...ph, year: yr.year });

      const sizes = [[800,600],[700,525],[600,600],[750,563],[680,510],[720,540]];
      const sz = sizes[(pi + yi) % sizes.length];

      const item = document.createElement('div');
      item.className = 'photo-item';
      item.innerHTML = `
        <div class="photo-inner">
          <img src="${imgUrl(ph.seed, sz[0], sz[1])}" alt="${ph.title}" loading="lazy">
          <div class="photo-overlay">
            <span class="photo-overlay-title">${ph.title}</span>
          </div>
        </div>
        <div class="photo-caption">
          <span class="caption-title">${ph.title}</span>
          <span class="caption-year">${yr.year}</span>
        </div>
      `;
      item.onclick = () => openLb(globalIdx);
      grid.appendChild(item);
    });

    block.appendChild(grid);
    timeline.appendChild(block);
  });
}

function openLb(idx) {
  lbIndex = idx;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLb() {
  const ph = currentPhotos[lbIndex];
  const img = document.getElementById('lb-img');
  img.src = imgUrl(ph.seed, 1200, 800);
  img.alt = ph.title;
  document.getElementById('lb-title').textContent = ph.title;
  document.getElementById('lb-sub').textContent = ph.desc + ' · ' + ph.year;
  document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + currentPhotos.length;
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === currentPhotos.length - 1;
}

document.getElementById('lb-close').onclick = closeLb;
document.getElementById('lb-prev').onclick = () => { if (lbIndex > 0) { lbIndex--; updateLb(); } };
document.getElementById('lb-next').onclick = () => { if (lbIndex < currentPhotos.length - 1) { lbIndex++; updateLb(); } };

document.getElementById('lightbox').onclick = (e) => {
  if (e.target === document.getElementById('lightbox')) closeLb();
};

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLb();
  if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; updateLb(); }
  if (e.key === 'ArrowRight' && lbIndex < currentPhotos.length - 1) { lbIndex++; updateLb(); }
});

render();
</script>
</body>
</html>
